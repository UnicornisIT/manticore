{% extends "base.html" %}
{% block title %}Редактировать студента{% endblock %}
{% block content %}
<h2 style="margin-bottom: 24px;">Редактировать студента</h2>
<form method="post" style="max-width: 480px; margin: 0 auto; background: #f3f6fa; padding: 28px 32px 22px 32px; border-radius: 12px; box-shadow: 0 2px 8px #e5e7eb;">
    {% include "_csrf_field.html" %}
    <div style="margin-bottom: 18px;">
        <label style="font-weight: 500; color: #374151;">Логин:</label>
        <div style="padding: 8px 12px; background: #e5e7eb; border-radius: 6px; color: #2563eb; font-size: 1.1em;">{{ student[0] }}</div>
    </div>
    <div style="margin-bottom: 18px;">
        <label for="password" style="font-weight: 500;">Пароль:</label>
        <input type="text" id="password" name="password" value="{{ student[1] }}" class="form-control" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
    </div>
    <div style="margin-bottom: 18px;">
        <label for="email" style="font-weight: 500;">Email:</label>
        <input type="email" id="email" name="email" value="{{ student[2] }}" class="form-control" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
    </div>
    <div style="margin-bottom: 18px;">
        <label for="firstname" style="font-weight: 500;">Имя:</label>
        <input type="text" id="firstname" name="firstname" value="{{ student[3] }}" class="form-control" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
    </div>
    <div style="margin-bottom: 18px;">
        <label for="lastname" style="font-weight: 500;">Фамилия:</label>
        <input type="text" id="lastname" name="lastname" value="{{ student[4] }}" class="form-control" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
    </div>
    <div style="margin-bottom: 24px;">
        <label for="cohort1" style="font-weight: 500;">Группа:</label>
        <input type="text" id="cohort1" name="cohort1" value="{{ student[5] }}" class="form-control" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
    </div>
    <div style="display: flex; gap: 12px;">
        <button type="submit" class="btn btn-success" style="flex: 1;">Сохранить</button>
        <a href="{{ url_for('students_list') }}" class="btn btn-secondary" style="flex: 1; text-align: center;">Назад</a>
    </div>
</form>
{% endblock %}
