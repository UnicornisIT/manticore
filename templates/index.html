{% extends "base.html" %}
{% block title %}Главная страница{% endblock %}
{% block head %}
<style>
    body.home-page .container {
        display: flex;
        flex-direction: column;
    }
    .home-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 24px;
        min-height: 0;
        padding: 28px 0 48px 0;
    }
    .home-content h1 {
        margin: 0;
        text-align: center;
    }
    .home-content .logo-container {
        margin: 0;
    }
    .home-content p {
        margin: 0;
        text-align: center;
    }
    @media (max-height: 720px) {
        .home-content {
            padding-top: 12px;
        }
        .home-content .logo-img {
            width: 220px !important;
            height: 150px !important;
        }
    }
</style>
{% endblock %}
{% block content %}
<div class="home-content">
    <h1>Главная страница</h1>
    <div class="logo-container">
        <img src="/static/logo.png" alt="Логотип" class="logo-img" style="width:300px; height:200px; object-fit:contain;">
    </div>
    <p>
        Для работы с файлами перейдите на страницу <a href="{{ url_for('file_work') }}" class="btn">Работа с файлами</a>
    </p>
</div>
{% endblock %}
