<!-- templates/register.html -->
{% extends "base.html" %}
{% block title %}Регистрация ассистента{% endblock %}
{% block content %}
<h1 style="text-align:center;">Регистрация ассистента</h1>
<form method="post" style="background:#fff; padding:32px 40px; border-radius:12px; box-shadow:0 4px 24px rgba(44,62,80,0.08); display:flex; flex-direction:column; align-items:center; max-width:400px; margin:32px auto;">
    <label style="width:100%; text-align:left; font-weight:500; margin-bottom:8px;">Логин:</label>
    <input type="text" name="username" required style="width:100%;margin-bottom:18px;padding:8px 10px;border-radius:6px;border:1px solid #e5e7eb;">
    <label style="width:100%; text-align:left; font-weight:500; margin-bottom:8px;">Пароль:</label>
    <input type="password" name="password" autocomplete="new-password" minlength="8" required style="width:100%;margin-bottom:8px;padding:8px 10px;border-radius:6px;border:1px solid #e5e7eb;">
    <div style="font-size:13px; color:#64748b; margin-bottom:18px;">Минимум 8 символов.</div>
    <button type="submit" class="btn" style="width:100%;">Зарегистрироваться</button>
    <a href="{{ url_for('login') }}" class="btn" style="width:100%; margin-top:12px; text-align:center; background:#e5e7eb; color:#1f2937;">Вернуться к входу</a>
</form>
{% endblock %}
