{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block head %}
<style>
    .login-page {
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 0;
    }
    .login-card {
        width: 100%;
        max-width: 420px;
        box-sizing: border-box;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(44, 62, 80, 0.10);
        padding: 38px 36px 30px;
    }
    .login-card h2 {
        margin: 0 0 26px;
        text-align: center;
        color: #2563eb;
        font-size: 28px;
    }
    .login-field {
        margin-bottom: 18px;
    }
    .login-field label {
        display: block;
        margin-bottom: 7px;
        font-weight: 600;
        color: #111827;
    }
    .login-field input {
        width: 100%;
        height: 38px;
        box-sizing: border-box;
        padding: 8px 11px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        color: #111827;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-field input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .login-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 24px;
    }
    .login-actions .btn {
        width: 100%;
        height: 38px;
        margin: 0;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-weight: 600;
    }
    .login-btn-secondary {
        background: #e5e7eb;
        color: #1f2937;
    }
    .login-btn-secondary:hover,
    .login-btn-secondary:focus {
        background: #d1d5db;
    }
    .login-message {
        margin-top: 18px;
        text-align: center;
        color: #ef4444;
        font-weight: 500;
    }
    @media (max-width: 520px) {
        .login-card {
            padding: 30px 22px 24px;
        }
        .login-actions {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}
{% block content %}
<div class="login-page">
    <form method="post" class="login-card">
        <h2>Вход</h2>
        <div class="login-field">
            <label for="username">Логин:</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="login-field">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <div class="login-actions">
            <button type="submit" class="btn">Войти</button>
            <a href="{{ url_for('register') }}" class="btn login-btn-secondary">Регистрация</a>
        </div>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="login-message">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}
    </form>
</div>
{% endblock %}
