name: pip-audit

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit tool
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements-prod.txt
